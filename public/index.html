<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Web Scrcpy</title>
<style>
body{background:#121212;color:#fff;padding:30px;font-family:Arial}
.box{max-width:900px;margin:auto;background:#1e1e1e;padding:25px;border-radius:12px}
input,button{width:100%;padding:12px;margin:8px 0;border-radius:8px;border:0}
input{background:#2d2d2d;color:white}
button{background:#6a5acd;color:white;font-size:16px}
#log{margin-top:10px;color:#aaa}
video{width:100%;background:#000;border-radius:10px;margin-top:20px}
</style>
</head>
<body>
<div class="box">
  <h2>Web Scrcpy 手机控制</h2>
  <input id="ip" placeholder="设备IP:端口 例 192.168.1.3:38521">
  <button onclick="start()">连接设备</button>
  <div id="log"></div>
  <video id="video" autoplay playsinline></video>
</div>

<script>
let ws;
function start() {
  let ip = document.getElementById('ip').value;
  if(!ip) return alert('请输入IP');
  log('连接中...');
  
  ws = new WebSocket('ws://'+location.hostname+':8081');
  ws.onopen = () => {
    ws.send(JSON.stringify({action:'connect', ip:ip}));
  };
  ws.onmessage = (e) => {
    if(typeof e.data === 'string'){
      log(JSON.parse(e.data).text || JSON.parse(e.data).error);
    }
  };
}

function log(t){
  document.getElementById('log').innerText = t;
}
</script>
</body>
</html>
