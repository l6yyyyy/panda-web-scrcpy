<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Web Scrcpy - 自动扫描</title>
<style>
body{background:#121212;color:#fff;padding:30px;font-family:Arial}
.box{max-width:900px;margin:auto;background:#1e1e1e;padding:25px;border-radius:12px}
button{width:100%;padding:14px;margin:8px 0;border-radius:8px;border:0;background:#6a5acd;color:white;font-size:16px}
.device{background:#2d2d2d;padding:12px;margin:6px 0;border-radius:8px;cursor:pointer}
#log{color:#aaa;margin-top:10px}
video{width:100%;background:#000;border-radius:10px;margin-top:20px}
</style>
</head>
<body>
<div class="box">
  <h2>Web Scrcpy 自动扫描</h2>
  <button onclick="scan()">🔍 扫描局域网设备</button>
  <div id="list"></div>
  <div id="log"></div>
  <video id="video" autoplay playsinline></video>
</div>

<script>
let ws;
connectWS();

function connectWS() {
  ws = new WebSocket('ws://' + location.hostname + ':8081');
  ws.onmessage = (e) => {
    if (typeof e.data === 'string') {
      let msg = JSON.parse(e.data);
      if (msg.text) log(msg.text);
      if (msg.action === 'deviceFound') addDevice(msg.ip);
    }
  };
}

function scan() {
  log('扫描中...');
  document.getElementById('list').innerHTML = '';
  ws.send(JSON.stringify({ action: 'scan' }));
}

function addDevice(ip) {
  let div = document.createElement('div');
  div.className = 'device';
  div.innerText = '📱 设备：' + ip;
  div.onclick = () => connect(ip);
  document.getElementById('list').append(div);
}

function connect(ip) {
  log('连接：' + ip);
  ws.send(JSON.stringify({ action: 'connect', ip: ip }));
}

function log(t) {
  document.getElementById('log').innerText = t;
}
</script>
</body>
</html>
