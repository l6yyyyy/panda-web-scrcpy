<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panda Web Scrcpy</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1e1e2e;color:#fff;padding:20px;font-family:system-ui}
.container{max-width:900px;margin:0 auto}
.title{text-align:center;font-size:26px;margin:20px 0}
.card{background:#2d2d3f;padding:24px;border-radius:12px}
input{width:100%;padding:14px;margin:10px 0;border-radius:8px;border:none;background:#3d3d5f;color:#fff;font-size:16px}
button{width:100%;padding:14px;background:#7c5cfc;border:none;color:#fff;border-radius:8px;font-size:16px;cursor:pointer}
button:hover{background:#6a4bee}
#video{width:100%;background:#000;border-radius:8px;margin-top:20px}
.log{color:#ccc;margin-top:10px}
</style>
</head>
<body>
<div class="container">
<div class="title">Panda Web Scrcpy 安卓网页控制</div>
<div class="card">
<input id="ip" placeholder="输入设备IP，例如 192.168.1.100">
<button onclick="connect()">连接设备</button>
<div class="log" id="log"></div>
<video id="video" autoplay playsinline></video>
</div>
</div>
<script>
let ws;
function connect(){
const ip=document.getElementById('ip').value;
if(!ip)return alert('请输入IP');
ws=new WebSocket(`ws://${location.host}`);
ws.onopen=()=>{ws.send(JSON.stringify({type:'connect',ip:ip}))};
ws.onmessage=(e)=>{
const d=JSON.parse(e.data);
document.getElementById('log').innerText=d.text||'';
};
}
</script>
</body>
</html>
